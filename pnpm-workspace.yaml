# pnpm 11 用 allowBuilds 布尔映射管理依赖 build 脚本（取代旧的 ignoredBuiltDependencies，
# 后者在全新安装下不生效，会导致 CI 报 ERR_PNPM_IGNORED_BUILDS）。
# 这四个原生包的二进制由各自平台的预编译 optional 依赖提供，无需运行 build 脚本，故置 false：
# 承认忽略、保持与本地/线上一致的不构建行为，同时消除全新安装的报错。
allowBuilds:
  '@tailwindcss/oxide': false
  esbuild: false
  sharp: false
  unrs-resolver: false
